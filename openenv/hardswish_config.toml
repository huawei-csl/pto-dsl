mode = "create"

kernel_dir  = "examples/aot/geglu_dynamic_multicore"  # reference for API patterns only
kernel_name = "hardswish"
create_file = "hardswish_builder.py"

build_cmd = ["bash", "compile.sh"]
test_cmd  = ["python", "run_hardswish.py"]
bench_cmd = ["python", "_bench_wrapper.py"]

create_prompt = """
Implement Hard-Swish activation (used in MobileNetV3):
    y = x * relu6(x + 3) / 6
      = x * clamp(x + 3, 0, 6) / 6

PyTorch reference: torch.nn.functional.hardswish(x)

Input:  fp16 tensor (batch, n_cols)
Output: fp16 tensor (batch, n_cols) — separate output pointer

The kernel signature in caller.cpp should be:
    extern "C" void call_kernel(uint32_t blockDim, void *stream,
                                uint8_t *x, uint8_t *y,
                                uint32_t batch, uint32_t n_cols)

The .so produced by compile.sh should be named hardswish_lib.so.
The test script run_hardswish.py should compare against torch.nn.functional.hardswish(x.float()).to(x.dtype).
The bench wrapper _bench_wrapper.py should print latency_ms=<value>.

Implementation hint: clamp(x + 3, 0, 6) can be computed as min(max(x + 3, 0), 6).
The division by 6 can be done as multiplication by 1/6 ≈ 0.16667.
"""

# These are loaded from the reference kernel_dir as examples — adapt them for hardswish
preload_files = ["compile.sh", "caller.cpp", "geglu_builder.py", "run_geglu.py", "_bench_wrapper.py"]

# Local PTO-DSL API files (authoritative, read from repo)
local_context_files = [
    "ptodsl/api/pto.py",
    "ptodsl/api/tile.py",
    "ptodsl/api/scalar.py",
    "ptodsl/api/control_flow.py",
    "ptodsl/api/synchronization.py",
]

